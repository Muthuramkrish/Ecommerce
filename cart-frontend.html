<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Clear Cart Feature</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
        }

        .auth-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .auth-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        .form-group input {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #2ed573 0%, #1e90ff 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(46, 213, 115, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .cart-section {
            margin-top: 30px;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .cart-header h2 {
            color: #333;
            font-size: 1.8rem;
        }

        .cart-count {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .cart-items {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }

        .cart-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s;
        }

        .cart-item:hover {
            transform: translateX(5px);
        }

        .item-info {
            flex: 1;
        }

        .item-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .item-details {
            color: #666;
            font-size: 0.9rem;
        }

        .item-price {
            font-weight: 600;
            color: #667eea;
            font-size: 1.1rem;
        }

        .cart-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .empty-cart {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-cart i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #ccc;
        }

        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-info {
            background: #cce7ff;
            color: #004085;
            border: 1px solid #b3d7ff;
        }

        .user-info {
            background: #e8f5e8;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .user-info h3 {
            color: #2d5a2d;
            margin-bottom: 5px;
        }

        .user-info p {
            color: #5a5a5a;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .auth-form {
                flex-direction: column;
                align-items: stretch;
            }

            .cart-header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .cart-item {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }

            .cart-actions {
                flex-direction: column;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 Shopping Cart</h1>
            <p>Manage your cart with user storage</p>
        </div>

        <div id="statusMessage"></div>

        <div class="auth-section">
            <div id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button class="btn btn-primary" onclick="signIn()">
                    <span id="loginSpinner" class="loading" style="display: none;"></span>
                    Sign In
                </button>
            </div>

            <div id="userInfo" style="display: none;" class="user-info">
                <h3 id="userName">Welcome!</h3>
                <p id="userEmail"></p>
                <button class="btn btn-danger" onclick="signOut()">Sign Out</button>
            </div>
        </div>

        <div class="cart-section">
            <div class="cart-header">
                <h2>Your Cart</h2>
                <span id="cartCount" class="cart-count">0 items</span>
            </div>

            <div id="cartItems" class="cart-items">
                <div class="empty-cart">
                    <div style="font-size: 4rem; margin-bottom: 20px;">🛒</div>
                    <h3>Your cart is empty</h3>
                    <p>Sign in to view your saved cart items</p>
                </div>
            </div>

            <div class="cart-actions">
                <button class="btn btn-success" onclick="loadCart()" id="loadCartBtn" disabled>
                    <span id="loadSpinner" class="loading" style="display: none;"></span>
                    Refresh Cart
                </button>
                <button class="btn btn-primary" onclick="addSampleItem()" id="addSampleBtn" disabled>
                    Add Sample Item
                </button>
                <button class="btn btn-danger" onclick="clearCart()" id="clearCartBtn" disabled>
                    <span id="clearSpinner" class="loading" style="display: none;"></span>
                    Clear Cart
                </button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:5000/api';
        let authToken = localStorage.getItem('authToken');
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');

        // Initialize the app
        document.addEventListener('DOMContentLoaded', function() {
            if (authToken && currentUser) {
                showUserInfo();
                loadCart();
            }
        });

        // Show status message
        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = `<div class="status-message status-${type}">${message}</div>`;
            setTimeout(() => {
                statusDiv.innerHTML = '';
            }, 5000);
        }

        // Sign in function
        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const spinner = document.getElementById('loginSpinner');

            if (!email || !password) {
                showStatus('Please enter both email and password', 'error');
                return;
            }

            spinner.style.display = 'inline-block';

            try {
                const response = await fetch(`${API_BASE_URL}/user/signin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    authToken = data.token;
                    currentUser = data.user;
                    localStorage.setItem('authToken', authToken);
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    showUserInfo();
                    showStatus('Successfully signed in!', 'success');
                    
                    // Load cart data if available
                    if (data.cart && data.cart.length > 0) {
                        displayCart(data.cart);
                    } else {
                        loadCart();
                    }
                } else {
                    showStatus(data.message || 'Sign in failed', 'error');
                }
            } catch (error) {
                console.error('Sign in error:', error);
                showStatus('Network error. Please try again.', 'error');
            } finally {
                spinner.style.display = 'none';
            }
        }

        // Sign out function
        function signOut() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('authToken');
            localStorage.removeItem('currentUser');
            
            document.getElementById('loginForm').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            
            // Disable cart buttons
            document.getElementById('loadCartBtn').disabled = true;
            document.getElementById('addSampleBtn').disabled = true;
            document.getElementById('clearCartBtn').disabled = true;
            
            // Clear cart display
            document.getElementById('cartItems').innerHTML = `
                <div class="empty-cart">
                    <div style="font-size: 4rem; margin-bottom: 20px;">🛒</div>
                    <h3>Your cart is empty</h3>
                    <p>Sign in to view your saved cart items</p>
                </div>
            `;
            document.getElementById('cartCount').textContent = '0 items';
            
            showStatus('Successfully signed out', 'info');
        }

        // Show user info
        function showUserInfo() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userName').textContent = `Welcome, ${currentUser.fullName}!`;
            document.getElementById('userEmail').textContent = currentUser.email;
            
            // Enable cart buttons
            document.getElementById('loadCartBtn').disabled = false;
            document.getElementById('addSampleBtn').disabled = false;
            document.getElementById('clearCartBtn').disabled = false;
        }

        // Load cart from server
        async function loadCart() {
            if (!authToken) {
                showStatus('Please sign in first', 'error');
                return;
            }

            const spinner = document.getElementById('loadSpinner');
            spinner.style.display = 'inline-block';

            try {
                const response = await fetch(`${API_BASE_URL}/user/cart`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    displayCart(data.cart || []);
                    showStatus('Cart loaded successfully', 'success');
                } else {
                    showStatus(data.message || 'Failed to load cart', 'error');
                }
            } catch (error) {
                console.error('Load cart error:', error);
                showStatus('Network error. Please try again.', 'error');
            } finally {
                spinner.style.display = 'none';
            }
        }

        // Clear cart function
        async function clearCart() {
            if (!authToken) {
                showStatus('Please sign in first', 'error');
                return;
            }

            if (!confirm('Are you sure you want to clear your entire cart? This action cannot be undone.')) {
                return;
            }

            const spinner = document.getElementById('clearSpinner');
            spinner.style.display = 'inline-block';

            try {
                const response = await fetch(`${API_BASE_URL}/user/cart`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    displayCart([]);
                    showStatus('Cart cleared successfully! 🎉', 'success');
                } else {
                    showStatus(data.message || 'Failed to clear cart', 'error');
                }
            } catch (error) {
                console.error('Clear cart error:', error);
                showStatus('Network error. Please try again.', 'error');
            } finally {
                spinner.style.display = 'none';
            }
        }

        // Add sample item for testing
        async function addSampleItem() {
            if (!authToken) {
                showStatus('Please sign in first', 'error');
                return;
            }

            // This is a mock function since we don't have actual products
            // In a real implementation, you would have actual product data
            showStatus('Sample item feature requires actual product data from your database', 'info');
        }

        // Display cart items
        function displayCart(cartItems) {
            const cartContainer = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');

            if (!cartItems || cartItems.length === 0) {
                cartContainer.innerHTML = `
                    <div class="empty-cart">
                        <div style="font-size: 4rem; margin-bottom: 20px;">🛒</div>
                        <h3>Your cart is empty</h3>
                        <p>Add some items to get started!</p>
                    </div>
                `;
                cartCount.textContent = '0 items';
                return;
            }

            cartCount.textContent = `${cartItems.length} item${cartItems.length !== 1 ? 's' : ''}`;

            const cartHTML = cartItems.map(item => `
                <div class="cart-item">
                    <div class="item-info">
                        <div class="item-title">${item['product-title'] || 'Unknown Product'}</div>
                        <div class="item-details">
                            Category: ${item.category || 'Unknown'} | 
                            Quantity: ${item.quantity || 1}
                        </div>
                    </div>
                    <div class="item-price">
                        ₹${item['new-price'] || '0'}
                    </div>
                </div>
            `).join('');

            cartContainer.innerHTML = cartHTML;
        }

        // Handle Enter key in login form
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                signIn();
            }
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                signIn();
            }
        });
    </script>
</body>
</html>
